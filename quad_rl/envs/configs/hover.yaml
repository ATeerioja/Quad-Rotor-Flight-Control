# Hover-at-target-position task config for QuadHover-v0. Inherits
# physics/simulation from base.yaml; adds the episode/reward/spawn/
# disturbance sections specific to this task.
defaults:
  - base.yaml

episode:
  max_steps: 1000              # 10 s at 100 Hz
  crash_altitude: 0.0           # m, episode ends if altitude drops below this
  max_tilt_deg: 60.0             # deg, episode ends beyond this tilt from upright
  bounding_box: 5.0                # m, half-width of allowed cube around origin

reward:
  terms:
    - {type: position, weight: 1.0}
    - {type: angular_velocity, weight: 0.1}
    - {type: action_magnitude, weight: 0.01}
    - {type: action_rate, weight: 0.01}
    - {type: hover_bonus, weight: 1.0, threshold: 0.1}  # threshold: m, distance to target counted as "hovering"
    - {type: crash_penalty, weight: 100.0}

spawn:
  position_perturbation: 0.2      # m, random spawn offset from target
  velocity_perturbation: 0.1       # m/s
  orientation_perturbation_deg: 5.0 # deg
  target_region: 1.0                 # m, half-width of region target is sampled from

# No wind/sensor-noise disturbance yet (that's Stage 1.3) -- both default
# to a no-op "none" type.
disturbance:
  force:
    type: none
  observation:
    type: none

# No per-episode parameter randomization yet -- an empty spec is a no-op,
# every episode uses physics's nominal values exactly (Stage 1.4 builds
# the seam; Stage 2/3 turn it on).
randomization:
  spec: {}

# Stage 1.4's domain-adaptation hook: when true, observation_space becomes
# a Dict with a "privileged_obs" key carrying the sampled physics
# parameters. False here so SB3's MlpPolicy keeps working untouched.
expose_privileged: false
